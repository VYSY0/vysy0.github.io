<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Announcements Viewer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f9f9f9;
            padding: 20px;
        }

        #file-container {
            max-width: 700px;
            margin: auto;
            padding: 20px;
            border: 1px solid #ccc;
            background: #fff;
        }

        .file-item {
            border-bottom: 1px solid #eee;
            padding: 10px 0;
        }

        .file-name {
            font-weight: bold;
            color: #333;
        }

        .file-date {
            font-size: 0.9em;
            color: #666;
        }

        /* Opcjonalnie styl dla treści md */
        .file-content img {
            max-width: 100%;
            display: block;
            margin: 10px 0;
        }
    </style>
</head>

<body>

    <h1>Announcements</h1>
    <div id="file-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        // funkcja wyciągająca datę z nazwy pliku
        function getDateFromFileName(filename) {
            // Nowy format: an_07-03-2026_19-04.md
            const match = filename.match(/_(\d{2})-(\d{2})-(\d{4})_(\d{2})-(\d{2})/);
            if (match) {
                const [, day, month, year, hour, min] = match;
                return `${day} ${month} ${year} ${hour}:${min}`;
            }
            // Fallback dla starego formatu
            const oldMatch = filename.match(/_(\d{2}\+\d{2}\+\d{4})/);
            return oldMatch ? oldMatch[1].replace(/\+/g, ' ') : 'Unknown date';
        }

        console.log('Script loaded');
        const container = document.getElementById('file-container');
        console.log('Container:', container);

        // Funkcja do ładowania plików
        async function loadFiles() {
            // Spróbuj najpierw załadować lokalnie
            try {
                console.log('Trying to load from local path...');
                const filename = 'an_07-03-2026_19-04.md';
                const response = await fetch('./a/' + filename);

                if (response.ok) {
                    console.log('Local file loaded successfully');
                    const mdText = await response.text();
                    if (mdText.trim() !== '') {
                        displayFile(filename, mdText);
                        return;
                    } else {
                        console.warn('Local file is empty, trying GitHub API');
                    }
                } else {
                    console.warn('Local file not found, trying GitHub API');
                }
            } catch (error) {
                console.warn('Error loading local file:', error);
            }

            // Fallback: ładuj z GitHub API
            try {
                console.log('Loading from GitHub API...');
                const apiUrl = 'https://api.github.com/repos/VYSY0/vysy0.github.io/contents/pages/vys/a';
                const response = await fetch(apiUrl);
                const files = await response.json();

                // Szukaj pliku o nowym formacie
                const file = files.find(f => f.name.match(/^an_\d{2}-\d{2}-\d{4}_\d{2}-\d{2}\.md$/));

                if (file && file.download_url) {
                    const mdResponse = await fetch(file.download_url);
                    const mdText = await mdResponse.text();
                    console.log('File loaded from GitHub:', file.name);
                    displayFile(file.name, mdText);
                }
            } catch (error) {
                console.error('Error loading from GitHub:', error);
                container.innerHTML = '<p>Error loading announcements: ' + error.message + '</p>';
            }
        }

        function displayFile(filename, mdText) {
            console.log('Displaying file:', filename);
            console.log('Markdown text:', mdText);

            const htmlContent = marked.parse(mdText);
            console.log('HTML content:', htmlContent);

            const fileDiv = document.createElement('div');
            fileDiv.classList.add('file-item');
            fileDiv.innerHTML = `
                <div class="file-name">${filename}</div>
                <div class="file-content">${htmlContent}</div>
                <div class="file-date">${getDateFromFileName(filename)}</div>
            `;
            container.appendChild(fileDiv);
            console.log('Content added to page');
        }

        loadFiles();
    </script>
</body>

</html>

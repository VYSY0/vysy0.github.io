<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Announcements Viewer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f9f9f9;
            padding: 20px;
        }

        #file-container {
            max-width: 700px;
            margin: auto;
            padding: 20px;
            border: 1px solid #ccc;
            background: #fff;
        }

        .file-item {
            border-bottom: 1px solid #eee;
            padding: 10px 0;
        }

        .file-name {
            font-weight: bold;
            color: #333;
        }

        .file-date {
            font-size: 0.9em;
            color: #666;
        }

        /* Opcjonalnie styl dla treści md */
        .file-content img {
            max-width: 100%;
            display: block;
            margin: 10px 0;
        }
    </style>
</head>

<body>

    <h1>Announcements</h1>
    <div id="file-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        // funkcja wyciągająca datę z nazwy pliku do wyświetlenia
        function getDateFromFileName(filename) {
            // Nowy format: an_07-03-2026_19-04.md
            const match = filename.match(/_(\d{2})-(\d{2})-(\d{4})_(\d{2})-(\d{2})/);
            if (match) {
                const [, day, month, year, hour, min] = match;
                return `${day} ${month} ${year} ${hour}:${min}`;
            }
            // Fallback dla starego formatu
            const oldMatch = filename.match(/_(\d{2}\+\d{2}\+\d{4})/);
            return oldMatch ? oldMatch[1].replace(/\+/g, ' ') : 'Unknown date';
        }

        // Funkcja do wyciągnięcia daty do sortowania (YYYYMMDDHHMI)
        function getSortableDate(filename) {
            const match = filename.match(/_(\d{2})-(\d{2})-(\d{4})_(\d{2})-(\d{2})/);
            if (match) {
                const [, day, month, year, hour, min] = match;
                return `${year}${month}${day}${hour}${min}`;
            }
            return '';
        }

        console.log('Script loaded');

        // GŁÓWNA FUNKCJA - Wyświetl ogłoszenia
        async function showAnnouncements(maxFiles = 5, elementID = 'file-container') {
            console.log(`showAnnouncements called with maxFiles=${maxFiles}, elementID=${elementID}`);
            
            const container = document.getElementById(elementID);
            if (!container) {
                console.error(`Element with ID "${elementID}" not found!`);
                return;
            }

            const isLocalhost = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
            console.log('Is localhost:', isLocalhost);

            let filesToDisplay = [];

            // Spróbuj lokalnie TYLKO na localhost
            if (isLocalhost) {
                try {
                    console.log('Trying to load from local path...');
                    const filenames = ['an_07-03-2026_19-04.md', 'an_07-03-2026_19-10.md'];

                    for (const filename of filenames) {
                        const response = await fetch('./a/' + filename);
                        if (response.ok) {
                            const mdText = await response.text();
                            if (mdText.trim() !== '') {
                                filesToDisplay.push({ name: filename, content: mdText });
                            }
                        }
                    }

                    // Sortuj od najnowszego do najstarszego
                    filesToDisplay.sort((a, b) => {
                        const sortA = getSortableDate(a.name);
                        const sortB = getSortableDate(b.name);
                        return sortB.localeCompare(sortA);
                    });

                    // Weź maksymalnie N plików
                    const selectedFiles = filesToDisplay.slice(0, maxFiles);

                    if (selectedFiles.length > 0) {
                        console.log('Local files loaded successfully:', selectedFiles.length);
                        displayFilesFromArray(selectedFiles, container);
                        return;
                    } else {
                        console.warn('No local files found, trying GitHub API');
                    }
                } catch (error) {
                    console.warn('Error loading local files:', error);
                }
            } else {
                console.log('Not on localhost, skipping local file load');
            }

            // Fallback: ładuj z GitHub API
            try {
                console.log('Loading from GitHub API...');
                const apiUrl = 'https://api.github.com/repos/VYSY0/vysy0.github.io/contents/pages/vys/a';
                const response = await fetch(apiUrl);
                const files = await response.json();

                // Filtruj pliki o nowym formacie
                const mdFiles = files.filter(f => f.name.match(/^an_\d{2}-\d{2}-\d{4}_\d{2}-\d{2}\.md$/));

                // Sortuj od najnowszego do najstarszego
                mdFiles.sort((a, b) => {
                    const sortA = getSortableDate(a.name);
                    const sortB = getSortableDate(b.name);
                    return sortB.localeCompare(sortA);
                });

                // Weź maksymalnie N plików
                const selectedFiles = mdFiles.slice(0, maxFiles);

                console.log('Found files:', selectedFiles.map(f => f.name));

                if (selectedFiles.length > 0) {
                    // Załaduj zawartość wszystkich plików
                    for (const file of selectedFiles) {
                        try {
                            const mdResponse = await fetch(file.download_url);
                            const mdText = await mdResponse.text();
                            filesToDisplay.push({ name: file.name, content: mdText });
                        } catch (error) {
                            console.error('Error fetching file content:', file.name, error);
                        }
                    }

                    if (filesToDisplay.length > 0) {
                        console.log('Files loaded from GitHub:', filesToDisplay.length);
                        displayFilesFromArray(filesToDisplay, container);
                    }
                } else {
                    console.error('No files found in GitHub API');
                    container.innerHTML = '<p>No announcements found</p>';
                }
            } catch (error) {
                console.error('Error loading from GitHub:', error);
                container.innerHTML = '<p>Error loading announcements: ' + error.message + '</p>';
            }
        }

        function displayFilesFromArray(filesArray, container) {
            console.log('Displaying', filesArray.length, 'files');

            filesArray.forEach(file => {
                const htmlContent = marked.parse(file.content);
                const fileDiv = document.createElement('div');
                fileDiv.classList.add('file-item');
                fileDiv.innerHTML = `
                    <div class="file-name">${file.name}</div>
                    <div class="file-content">${htmlContent}</div>
                    <div class="file-date">${getDateFromFileName(file.name)}</div>
                `;
                container.appendChild(fileDiv);
            });

            console.log('All files added to page');
        }

        // Automatyczne ładowanie dla domyślnego kontenera
        showAnnouncements(5, 'file-container');
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Announcements Viewer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f9f9f9;
            padding: 20px;
        }

        #file-container {
            max-width: 700px;
            margin: auto;
            padding: 20px;
            border: 1px solid #ccc;
            background: #fff;
        }

        .file-item {
            border-bottom: 1px solid #eee;
            padding: 10px 0;
        }

        .file-name {
            font-weight: bold;
            color: #333;
        }

        .file-date {
            font-size: 0.9em;
            color: #666;
        }

        /* Opcjonalnie styl dla treści md */
        .file-content img {
            max-width: 100%;
            display: block;
            margin: 10px 0;
        }
    </style>
</head>

<body>

    <h1>Announcements</h1>
    <div id="file-container"></div>

    <script type="module" src="../../src/s/vys/utils/vysAnnouncements.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Announcements Viewer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f9f9f9;
            padding: 20px;
        }

        #file-container {
            max-width: 700px;
            margin: auto;
            padding: 20px;
            border: 1px solid #ccc;
            background: #fff;
        }

        .file-item {
            border-bottom: 1px solid #eee;
            padding: 10px 0;
        }

        .file-name {
            font-weight: bold;
            color: #333;
        }

        .file-date {
            font-size: 0.9em;
            color: #666;
        }

        /* Opcjonalnie styl dla treści md */
        .file-content img {
            max-width: 100%;
            display: block;
            margin: 10px 0;
        }
    </style>
</head>

<body>

    <h1>Announcements</h1>
    <div id="file-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        // funkcja wyciągająca datę z nazwy pliku
        function getDateFromFileName(filename) {
            const match = filename.match(/_(\d{2}\+\d{2}\+\d{4})_(\d{2}:\d{2})/);
            if (match) {
                const date = match[1].replace(/\+/g, '/');
                const time = match[2];
                return `${date} ${time}`;
            }
            // Fallback dla starego formatu bez godziny
            const oldMatch = filename.match(/_(\d{2}\+\d{2}\+\d{4})/);
            return oldMatch ? oldMatch[1].replace(/\+/g, ' ') : 'Unknown date';
        }

        // Simple test without modules
        console.log('Simple script loaded');
        const container = document.getElementById('file-container');
        console.log('Container:', container);

        const filename = 'an_07+03+2026_19:04.md';
        fetch('./a/' + filename)
            .then(response => {
                console.log('Fetch response:', response);
                return response.text();
            })
            .then(mdText => {
                console.log('Markdown text:', mdText);
                const htmlContent = marked.parse(mdText);
                console.log('HTML content:', htmlContent);

                const fileDiv = document.createElement('div');
                fileDiv.classList.add('file-item');
                fileDiv.innerHTML = `
                    <div class="file-name">${filename}</div>
                    <div class="file-content">${htmlContent}</div>
                    <div class="file-date">${getDateFromFileName(filename)}</div>
                `;
                container.appendChild(fileDiv);
                console.log('Content added to page');
            })
            .catch(error => {
                console.error('Error:', error);
                container.innerHTML = '<p>Error loading content: ' + error.message + '</p>';
            });
    </script>
</body>

</html>
